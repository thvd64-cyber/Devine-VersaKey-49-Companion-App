<!DOCTYPE html>
<!-- ============================================================
     Devine VersaKey — MIDI Controller App
     VERSIE : 2.0.0
     DATUM  : 2026-04-05
     DOEL   : PWA voor Windows, Android, Chrome/Edge via USB-MIDI
     
     CHANGELOG v2.0.0 (t.o.v. v1.x):
     - AudioKit J6 sectie verwijderd (niet verder ontwikkeld)
     - Dubbele HTML-code verwijderd (was 2x dezelfde app in 1 bestand)
     - USB-MIDI verbinding verbeterd voor Chrome op Windows/Android
     - Inline uitleg toegevoegd bij elke coderegel
     - Versie-badge toegevoegd in de topbar
     - MIDI-apparaat automatisch herkend (VersaKey/Devine)
     - Foutmelding in het Nederlands bij geen MIDI-toegang
     ============================================================ -->
<html lang="nl">
<head>

<!-- Vertel de browser welke tekens we gebruiken (altijd UTF-8) -->
<meta charset="UTF-8">

<!-- Zorg dat de app goed past op telefoons en tablets, niet zoombaar -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<!-- Zorgt dat de app er uit ziet als een echte app op iPhone/iPad -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="VersaKey">

<!-- Kleur van de adresbalk op Android Chrome -->
<meta name="theme-color" content="#f0ebe0">

<!-- Beschrijving van de app (voor zoekmachines en PWA stores) -->
<meta name="description" content="Devine VersaKey Series MIDI Keyboard App — VK-25, VK-49, VK-61, VK-88 | USB-MIDI voor Windows &amp; Android">

<!-- Paginatitel zoals te zien in de browsertab -->
<title>Devine VersaKey — MIDI Controller</title>

<!-- PWA manifest: maakt de app installeerbaar als desktop/telefoon-app -->
<link rel="manifest" href="manifest.json">

<!-- App-icoon voor Apple apparaten -->
<link rel="apple-touch-icon" href="icon-192.svg">

<!-- Google Fonts: Space Mono voor code-stijl tekst, Outfit voor leesbare tekst -->
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
/* ── CSS VARIABELEN ─────────────────────────────────────────────
   Alle kleuren en afmetingen op één plek, makkelijk aan te passen */
:root {
  --bg:       #f0ebe0;  /* Achtergrondkleur: warm ivoor */
  --surface:  #e8e2d4;  /* Paneel-achtergrond: iets donkerder ivoor */
  --surface2: #ddd8cc;  /* Tweede laag paneel */
  --surface3: #ccc6b8;  /* Derde laag (sliders, etc.) */
  --accent:   #8b6f3a;  /* Hoofdkleur: warme bruine tint */
  --accent2:  #b8935a;  /* Lichtere accentkleur */
  --text:     #2a2520;  /* Hoofdtekstkleur: donkerbruin */
  --muted:    #7a7060;  /* Grijze tekst voor labels */
  --dim:      #b0a898;  /* Nog grijzer voor niet-actieve elementen */
  --border:   rgba(139,111,58,.18); /* Subtiele rand */
  --wk:       #faf8f3;  /* Kleur witte piano-toets */
  --wkh:      #fff9ee;  /* Witte toets bij hover */
  --wka:      #BA7517;  /* Witte toets ingedrukt (oranje-goud) */
  --bk:       #1c1a18;  /* Kleur zwarte piano-toets */
  --bka:      #854F0B;  /* Zwarte toets ingedrukt */
  --ok:       #2d7a3a;  /* Groen = alles goed (MIDI verbonden) */
  --err:      #a33030;  /* Rood = fout (geen MIDI) */
}

/* Alle elementen: geen ongewenste marges, geen tekstselectie (voor aanraakschermen) */
* {
  box-sizing: border-box;           /* Afmetingen inclusief rand en opvulling */
  margin: 0;                        /* Geen buitenruimte */
  padding: 0;                       /* Geen binnenruimte */
  -webkit-tap-highlight-color: transparent; /* Geen blauwe flits bij aanraken op mobiel */
  touch-action: none;               /* Standaard: blokkeer scrollgebaren (voor piano) */
  user-select: none;                /* Geen tekst selecteren met muis */
}

/* Hoofd-lay-out: alles van boven naar beneden gestapeld, vult het scherm */
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  height: 100vh;                    /* Vul het volledige venster */
  display: flex;
  flex-direction: column;           /* Stapel secties verticaal */
  overflow: hidden;                 /* Geen scrollbalk op de pagina zelf */
}

/* ── TOPBAR ─────────────────────────────────────────────────────
   De bovenste balk met logo, modelknoppen, geluid, octaaf, etc. */
.topbar {
  display: flex;
  align-items: center;
  gap: 8px;                         /* Ruimte tussen elementen */
  padding: 10px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;                   /* Balk krimpt niet als scherm klein is */
  flex-wrap: wrap;                  /* Elementen gaan naar volgende rij als te smal */
}

/* Logo-blok: ronde stip + tekst */
.logo {
  display: flex;
  align-items: center;
  gap: 9px;
  flex-shrink: 0;
}

/* De oranje ronde stip in het logo */
.logo-dot {
  width: 28px;
  height: 28px;
  background: var(--accent);
  border-radius: 50%;               /* Perfecte cirkel */
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Kleine witte stip binnenin de oranje stip */
.logo-dot::after {
  content: '';
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--bg);
}

/* "DEVINE" tekst in het logo */
.logo-text {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  color: var(--accent);
  letter-spacing: .07em;
}

/* "VersaKey Series" tekst onder het logo */
.logo-sub {
  font-size: 10px;
  color: var(--muted);
  margin-top: 1px;
}

/* Versie-badge naast het logo */
.version-badge {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  color: var(--dim);
  padding: 2px 6px;
  border: 1px solid var(--border);
  border-radius: 10px;
  flex-shrink: 0;
}

/* Verticale scheidingslijn tussen secties in de topbar */
.sep {
  width: 1px;
  height: 20px;
  background: var(--border);
  flex-shrink: 0;
}

/* Kleine grijze labels ("MODEL", "GELUID", etc.) */
.lbl {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: .05em;
  text-transform: uppercase;
  font-family: 'Space Mono', monospace;
  white-space: nowrap;
}

/* Waarde-weergave (bijv. octaaf "C2", volume "80") */
.val {
  font-size: 12px;
  color: var(--accent);
  font-family: 'Space Mono', monospace;
  min-width: 26px;
  text-align: center;
}

/* Knoppen (VK-25, VK-49, +, -, Sustain, etc.) */
.btn {
  padding: 4px 9px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size: 11px;
  cursor: pointer;
  transition: all .12s;
  white-space: nowrap;
  font-family: 'Outfit', sans-serif;
}
.btn:hover  { background: var(--surface2); border-color: var(--accent); }
.btn:active { transform: scale(.93); }           /* Klein indruk-effect */
.btn.on     { background: var(--accent); color: #fff; border-color: var(--accent); } /* Actief = oranje */
.btn.mon    { background: rgba(139,111,58,.15); color: var(--accent); border-color: var(--accent); font-weight: 600; } /* Model-actief */

/* Dropdown (geluidskeuze) */
.sel {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 4px 9px;
  border-radius: 6px;
  font-size: 11px;
  font-family: 'Outfit', sans-serif;
  outline: none;
  cursor: pointer;
  max-width: 148px;
  touch-action: auto;               /* Dropdown mag wel scrollen */
}
.sel:focus { border-color: var(--accent); }

/* Volume-schuifbalk */
.rng {
  -webkit-appearance: none;
  height: 3px;
  border-radius: 2px;
  background: var(--surface3);
  outline: none;
  width: 72px;
  accent-color: var(--accent);
}
.rng::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
  border: 2px solid var(--bg);
}

/* MIDI-verbindingsbadge (knopje rechts in topbar) */
.midi-badge {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--bg);
  font-size: 10px;
  font-family: 'Space Mono', monospace;
  color: var(--muted);
  cursor: pointer;
  white-space: nowrap;
  flex-shrink: 0;
}
.midi-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--dim); transition: background .3s; flex-shrink: 0; }
.midi-badge.ok   { color: var(--ok); }
.midi-badge.ok .dot  { background: var(--ok); box-shadow: 0 0 4px var(--ok); }  /* Groen gloeien = verbonden */
.midi-badge.err  { color: var(--err); }
.midi-badge.err .dot { background: var(--err); }

/* ── USB-MIDI HELPBALK ───────────────────────────────────────────
   Verschijnt alleen als er geen MIDI-apparaat gevonden wordt */
.usb-hint {
  display: none;                    /* Standaard verborgen */
  align-items: center;
  gap: 10px;
  padding: 6px 16px;
  background: rgba(163,48,48,.07);  /* Licht rood achtergrond */
  border-bottom: 1px solid rgba(163,48,48,.2);
  font-size: 11px;
  color: var(--err);
  font-family: 'Space Mono', monospace;
}
.usb-hint.show { display: flex; }   /* Zichtbaar als er geen MIDI is */
.usb-hint a    { color: var(--accent); text-decoration: underline; cursor: pointer; }

/* ── DRUM PADS BALK ─────────────────────────────────────────────*/
.pads-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
}

/* Raster van 8 pads naast elkaar */
.pads-grid {
  display: grid;
  grid-template-columns: repeat(8, 1fr); /* 8 gelijke kolommen */
  gap: 5px;
  flex: 1;
  min-width: 0;
}

/* Eén drum-pad */
.pad {
  height: 42px;
  border-radius: 6px;
  border: 1px solid rgba(0,0,0,.1);
  background: var(--surface);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 1px;
  transition: all .08s;
  position: relative;
  overflow: hidden;
  touch-action: none;
  box-shadow: 0 1px 3px rgba(0,0,0,.08), inset 0 1px 0 rgba(255,255,255,.5);
}

/* Gekleurde achtergrond van een pad (de kleur van het instrument) */
.pad-bg {
  position: absolute;
  inset: 0;
  opacity: .16;
  transition: opacity .08s;
}
.pad:hover .pad-bg { opacity: .28; }      /* Iets donkerder bij hoveren */
.pad.hit           { transform: scale(.89); box-shadow: inset 0 2px 5px rgba(0,0,0,.18); } /* Ingedrukt effect */
.pad.hit .pad-bg   { opacity: .65; }

/* Naam van het instrument op de pad (bijv. "Kick") */
.pad-name {
  font-size: 9px;
  font-weight: 600;
  color: var(--text);
  position: relative;
  z-index: 1;
  text-align: center;
  font-family: 'Space Mono', monospace;
}

/* Padnummer (1-8 of 9-16) */
.pad-n {
  font-size: 7px;
  color: var(--muted);
  position: relative;
  z-index: 1;
}

/* ── MIDI APPARAAT BALK ─────────────────────────────────────────
   Verschijnt als er MIDI-apparaten gevonden worden */
.midi-bar {
  display: none;
  align-items: center;
  gap: 8px;
  padding: 5px 16px;
  background: rgba(45,122,58,.06);  /* Licht groen achtergrond */
  border-bottom: 1px solid rgba(45,122,58,.15);
}
.midi-bar.show { display: flex; }   /* Zichtbaar als er MIDI-apparaten zijn */

/* Dropdown om het MIDI-apparaat te kiezen */
.midi-sel {
  background: var(--bg);
  border: 1px solid rgba(45,122,58,.25);
  color: var(--text);
  padding: 3px 9px;
  border-radius: 6px;
  font-size: 11px;
  font-family: 'Outfit', sans-serif;
  outline: none;
  cursor: pointer;
  flex: 1;
  max-width: 280px;
  touch-action: auto;
}
.midi-info { font-size: 10px; color: var(--ok); font-family: 'Space Mono', monospace; }

/* ── KLAVIERBORD WRAPPER ─────────────────────────────────────────*/
.kb-wrap {
  flex: 1;                          /* Vult de resterende ruimte */
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 14px 16px 10px;
  overflow: hidden;
  position: relative;
}

/* Piano en touch-strips naast elkaar */
.kb-area {
  display: flex;
  align-items: flex-end;
  width: 100%;
  justify-content: center;
}

/* Scrollbare zone voor de piano (horizontaal scrollen als te smal) */
.kb-scroll {
  overflow-x: auto;
  overflow-y: hidden;
  -webkit-overflow-scrolling: touch; /* Vloeiend scrollen op iOS */
  scrollbar-width: thin;
  scrollbar-color: var(--surface3) transparent;
}
.kb-scroll::-webkit-scrollbar       { height: 3px; }
.kb-scroll::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

/* Het piano-element zelf (toetsen worden hier ingevoegd via JavaScript) */
.keyboard {
  position: relative;
  display: inline-block;
}

/* Witte piano-toets */
.wk {
  position: absolute;
  bottom: 0;
  background: var(--wk);
  border: 1px solid #c8bfb0;
  border-radius: 0 0 4px 4px;
  cursor: pointer;
  z-index: 1;                       /* Achter zwarte toetsen */
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding-bottom: 5px;
  box-shadow: 0 2px 4px rgba(0,0,0,.1), inset 0 -2px 4px rgba(0,0,0,.05);
  touch-action: none;
}
.wk:hover { background: var(--wkh); }
.wk.on    { background: var(--wka) !important; } /* Ingedrukt = oranje-goud */

/* Zwarte piano-toets */
.bk {
  position: absolute;
  top: 0;
  background: linear-gradient(to bottom, #2a2820, var(--bk));
  border: 1px solid #000;
  border-radius: 0 0 3px 3px;
  cursor: pointer;
  z-index: 2;                       /* Vóór witte toetsen */
  box-shadow: 2px 3px 5px rgba(0,0,0,.4);
  touch-action: none;
}
.bk:hover { background: linear-gradient(to bottom, #3a3830, #2e2c28); }
.bk.on    { background: var(--bka) !important; }

/* "C2", "C3" labels op de witte toetsen */
.k-lbl {
  font-size: 8px;
  color: #888;
  font-family: 'Space Mono', monospace;
}

/* ── TOUCH STRIPS (Pitch en Mod) ────────────────────────────────*/
.strips {
  display: flex;
  gap: 6px;
  margin-right: 10px;
  flex-shrink: 0;
  padding-bottom: 20px;
}

/* Eén strip (de glijbalk) */
.strip {
  width: 20px;
  height: 165px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  position: relative;
  overflow: hidden;
  cursor: ns-resize;                /* Cursor verandert in pijl omhoog/omlaag */
  box-shadow: inset 0 2px 5px rgba(0,0,0,.05);
  touch-action: none;
}

/* De gekleurde vulling in de strip (hoe ver je hem hebt bewogen) */
.sf {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  border-radius: 0 0 10px 10px;
  transition: height .04s;
}
.pf { background: #3b82f6; }        /* Blauw = Pitch Bend */
.mf { background: var(--accent); }  /* Oranje = Modulatie */

/* Label onder de strip */
.s-lbl {
  font-size: 8px;
  color: var(--muted);
  text-align: center;
  margin-top: 3px;
  letter-spacing: .04em;
  font-family: 'Space Mono', monospace;
}

/* ── STATUSBALK ONDERAAN ────────────────────────────────────────*/
.note-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 5px 16px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.note-txt { font-size: 11px; font-family: 'Space Mono', monospace; color: var(--muted); }

/* Klein LED-lampje dat knippert als er MIDI-data doorkomt */
.led {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--dim);
  transition: all .05s;
}
.led.f { background: var(--ok); box-shadow: 0 0 6px var(--ok); } /* Groen knippert */

/* ── RESPONSIVE: KLEINE SCHERMEN ────────────────────────────────*/
@media (max-width: 650px) {
  .pads-grid  { grid-template-columns: repeat(4, 1fr); } /* 4 pads per rij op telefoon */
  .sel        { max-width: 115px; }
  .rng        { width: 55px; }
  .topbar     { padding: 8px 10px; gap: 6px; }
  .pads-bar   { padding: 7px 10px; }
  .kb-wrap    { padding: 10px 10px 8px; }
}
</style>
</head>
<body>

<!-- ══════════════════════════════════════════════════════════════
     TOPBAR: Logo + Model + Geluid + Octaaf + Volume + MIDI badge
     ══════════════════════════════════════════════════════════════ -->
<div class="topbar">

  <!-- Logo links -->
  <div class="logo">
    <div class="logo-dot"></div>
    <div>
      <div class="logo-text">DEVINE</div>
      <div class="logo-sub">VersaKey Series</div>
    </div>
  </div>

  <!-- Versie-badge naast logo -->
  <span class="version-badge">v2.0</span>

  <div class="sep"></div>

  <!-- Modelknoppen: klik om het aantal toetsen te kiezen -->
  <span class="lbl">Model</span>
  <button class="btn"     id="m25" onclick="setModel(25)">VK-25</button>
  <button class="btn mon" id="m49" onclick="setModel(49)">VK-49</button>
  <button class="btn"     id="m61" onclick="setModel(61)">VK-61</button>
  <button class="btn"     id="m88" onclick="setModel(88)">VK-88</button>

  <div class="sep"></div>

  <!-- Geluidskeuze dropdown -->
  <span class="lbl">Geluid</span>
  <select class="sel" id="instrSel" onchange="setInstr(this.value)">
    <optgroup label="Piano">
      <option value="0" selected>Grand Piano</option>
      <option value="1">Bright Piano</option>
      <option value="2">Electric Grand</option>
      <option value="4">E-Piano 1</option>
      <option value="5">E-Piano 2</option>
      <option value="6">Harpsichord</option>
    </optgroup>
    <optgroup label="Orgel">
      <option value="16">Drawbar Organ</option>
      <option value="18">Rock Organ</option>
      <option value="19">Church Organ</option>
    </optgroup>
    <optgroup label="Gitaar">
      <option value="24">Nylon Guitar</option>
      <option value="25">Steel Guitar</option>
      <option value="30">Dist. Guitar</option>
    </optgroup>
    <optgroup label="Strijkers">
      <option value="40">Violin</option>
      <option value="48">Strings 1</option>
      <option value="49">Strings 2</option>
    </optgroup>
    <optgroup label="Blaas">
      <option value="56">Trumpet</option>
      <option value="61">Brass Section</option>
    </optgroup>
    <optgroup label="Synth">
      <option value="80">Syn Square</option>
      <option value="81">Syn Saw</option>
      <option value="88">New Age Pad</option>
      <option value="89">Warm Pad</option>
    </optgroup>
    <optgroup label="Bas">
      <option value="32">Acoustic Bass</option>
      <option value="33">Fingered Bass</option>
      <option value="38">Synth Bass</option>
    </optgroup>
  </select>

  <div class="sep"></div>

  <!-- Octaaf verschuiven: - knop, waarde, + knop -->
  <span class="lbl">Oct</span>
  <button class="btn" onclick="chOct(-1)">−</button>
  <span class="val" id="octV">C2</span>
  <button class="btn" onclick="chOct(1)">+</button>

  <div class="sep"></div>

  <!-- Toonhoogte verschuiven in halve tonen -->
  <span class="lbl">Transp</span>
  <button class="btn" onclick="chTr(-1)">−</button>
  <span class="val" id="trV">0</span>
  <button class="btn" onclick="chTr(1)">+</button>

  <div class="sep"></div>

  <!-- Volume schuifbalk + waarde -->
  <span class="lbl">Vol</span>
  <input type="range" class="rng" min="0" max="100" value="80" step="1" oninput="chVol(this.value)">
  <span class="val" id="volV">80</span>

  <div class="sep"></div>

  <!-- Sustain knop: houdt noten vast (zoals sustain-pedaal) -->
  <button class="btn" id="susBtn" onclick="chSus()">Sustain</button>

  <div class="sep"></div>

  <!-- MIDI verbindingsbadge: klik om opnieuw te scannen -->
  <div class="midi-badge" id="midiBadge" onclick="scanMidi()" title="Klik om MIDI apparaten te scannen">
    <div class="dot"></div>
    <span id="midiLbl">MIDI scannen…</span>
  </div>

</div><!-- /topbar -->

<!-- ══════════════════════════════════════════════════════════════
     USB-HINT: Hulpbalk als MIDI niet werkt of niet ondersteund is
     ══════════════════════════════════════════════════════════════ -->
<div class="usb-hint" id="usbHint">
  <!-- Uitleg wat de gebruiker moet doen als MIDI niet werkt -->
  <span>⚠️ Geen MIDI gevonden —</span>
  <span>sluit je VersaKey aan via <strong>USB-kabel</strong> en gebruik <strong>Chrome</strong> of <strong>Edge</strong> op Windows/Android.</span>
  <span id="usbHintDetail"></span>
</div>

<!-- ══════════════════════════════════════════════════════════════
     DRUM PADS BALK
     ══════════════════════════════════════════════════════════════ -->
<div class="pads-bar">
  <span class="lbl">Drum Pads</span>
  <!-- 8 pads worden hier ingevoegd door buildPads() in JavaScript -->
  <div class="pads-grid" id="padsG"></div>
  <!-- Knop om te wisselen tussen pad-bank 1-8 en 9-16 -->
  <button class="btn" id="bankBtn" onclick="chBank()" style="flex-shrink:0;margin-left:4px;">Bank 1–8</button>
</div>

<!-- ══════════════════════════════════════════════════════════════
     JAVASCRIPT
     ══════════════════════════════════════════════════════════════ -->
<script>
/* ── VERSIE INFO ─────────────────────────────────────────────────
   Sla de versie op zodat we hem kunnen loggen en vergelijken */
var APP_VERSION = '2.0.0';
console.log('[VersaKey] app versie', APP_VERSION, '| USB-MIDI modus voor Chrome/Windows/Android');

/* ── NOOT NAMEN EN PIANO LAYOUT ──────────────────────────────────
   NN = namen van de 12 noten per octaaf (C t/m B)
   BP = 1 betekent zwarte toets, 0 = witte toets */
var NN = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
var BP = [0,1,0,1,0,0,1,0,1,0,1,0];

/* ── MODEL CONFIGURATIE ──────────────────────────────────────────
   s = eerste MIDI-nootnummer, n = aantal toetsen
   VK-25 begint op C3 (48), VK-49 en VK-61 beginnen op C2 (36), VK-88 op A0 (21) */
var MC = {
  25: { s: 48, n: 25 },
  49: { s: 36, n: 49 },
  61: { s: 36, n: 61 },
  88: { s: 21, n: 88 }
};

/* ── AFMETINGEN PIANO-TOETSEN ────────────────────────────────────
   WW = breedte witte toets, WH = hoogte witte toets
   BW = breedte zwarte toets, BH = hoogte zwarte toets */
var WW=36, WH=170, BW=22, BH=105;

/* ── TOESTANDSVARIABELEN ─────────────────────────────────────────
   Sla de huidige toestand van alle instellingen op */
var aC     = null;    /* AudioContext: de motor die geluid maakt */
var mG     = null;    /* Master gain node: regelt het totaalvolume */
var aN     = {};      /* Actieve Noten: {midiNr: {gain, oscillators, profiel}} */
var sus    = false;   /* Sustain aan/uit */
var susH   = {};      /* Noten die worden vastgehouden door sustain */
var vol    = .8;      /* Volume 0.0 tot 1.0 */
var vel    = 90;      /* Aanslagsterkte (MIDI velocity) 0-127 */
var octOff = 0;       /* Octaafverschuiving: hoeveel octaven omhoog/omlaag */
var tr     = 0;       /* Transpositie: halve tonen omhoog/omlaag */
var instr  = 0;       /* Geselecteerd instrument (GM programmanummer) */
var mdl    = 49;      /* Actief klaviermodel (25, 49, 61 of 88) */
var pb     = 0;       /* Pitch Bend waarde (-2 tot +2 octaven) */
var sDr    = {};      /* Strip sleepstatus: {p: boolean, m: boolean} */
var bank   = 0;       /* Actieve pad-bank: 0 = pads 1-8, 1 = pads 9-16 */

/* ── MIDI VARIABELEN ─────────────────────────────────────────────*/
var mAcc = null;      /* MIDIAccess object (van de browser WebMIDI API) */
var mIns = [];        /* Lijst van alle MIDI invoerapparaten */
var actIn = null;     /* Momenteel geselecteerde MIDI invoer */

/* ── GELUID PROFIELEN ────────────────────────────────────────────
   Elk instrument heeft een profiel met:
   t  = golfvorm (sine=zacht, sawtooth=rauw, triangle=warm)
   a  = attack tijd (hoe snel het geluid start, in seconden)
   d  = decay tijd (hoe snel het daalt na de piek)
   s  = sustain niveau (0.0-1.0)
   r  = release tijd (hoe lang het naklinkt na loslaten)
   h  = harmonischen (boventonen, geeft het klankkleur)
   dt = detune (kleine toonhoogteverschillen voor dikte) */
var PRF = {
  pi: { t:'triangle',  a:.005, d:.3,  s:.4,  r:.8,  h:[1,.5,.25,.12,.06], dt:0  }, /* Piano */
  or: { t:'sine',      a:.01,  d:0,   s:1,   r:.1,  h:[1,.8,.6,.3],       dt:0  }, /* Orgel */
  gu: { t:'sawtooth',  a:.003, d:.15, s:.3,  r:.4,  h:[1,.6,.3,.15],      dt:2  }, /* Gitaar */
  st: { t:'sawtooth',  a:.09,  d:.1,  s:.8,  r:.6,  h:[1,.7,.3,.1],       dt:6  }, /* Strijkers */
  br: { t:'sawtooth',  a:.04,  d:.08, s:.9,  r:.2,  h:[1,.6,.4,.2],       dt:3  }, /* Blaas */
  sy: { t:'sawtooth',  a:.01,  d:.1,  s:.7,  r:.3,  h:[1,.5,.33,.25],     dt:0  }, /* Synth */
  ba: { t:'triangle',  a:.005, d:.2,  s:.5,  r:.3,  h:[1,.8,.2,.08],      dt:1  }, /* Bas */
  pa: { t:'sine',      a:.22,  d:.1,  s:.9,  r:.9,  h:[1,.6,.3,.15],      dt:9  }  /* Pad */
};

/* Kies het geluidsprofiel op basis van het GM programmanummer */
function gP(i) {
  i = +i; /* Zorg dat i een getal is */
  if (i <= 7)              return PRF.pi; /* Piano-familie */
  if (i >= 16 && i <= 23) return PRF.or; /* Orgel-familie */
  if (i >= 24 && i <= 31) return PRF.gu; /* Gitaar-familie */
  if (i >= 32 && i <= 39) return PRF.ba; /* Bas-familie */
  if (i >= 40 && i <= 55) return PRF.st; /* Strijkers-familie */
  if (i >= 56 && i <= 63) return PRF.br; /* Blaas-familie */
  if (i >= 80 && i <= 87) return PRF.sy; /* Synth-familie */
  if (i >= 88 && i <= 95) return PRF.pa; /* Pad-familie */
  return PRF.pi; /* Standaard: piano */
}

/* Zet een MIDI-nootnummer om naar frequentie in Hz
   Formule: 440 Hz * 2^((noot-69)/12) — dit is de standaard muziekformule */
function m2f(n) { return 440 * Math.pow(2, (n - 69) / 12); }

/* ── AUDIO CONTEXT INITIALISATIE ────────────────────────────────
   De AudioContext mag pas starten na een gebruikersactie (browserregel) */
function iA() {
  if (aC) return; /* Al aangemaakt? Niets te doen */
  aC = new (window.AudioContext || window.webkitAudioContext)(); /* Maak de audio-motor */
  mG = aC.createGain(); /* Maak de volumeregelaar */
  mG.gain.value = vol;  /* Stel het volume in */
  mG.connect(aC.destination); /* Verbind met de luidsprekers */
}

/* Hervat de AudioContext als de browser hem heeft gepauzeerd */
function rA() { if (aC && aC.state === 'suspended') aC.resume(); }

/* ── NOOT AAN ────────────────────────────────────────────────────
   Speel een noot af.
   mn = MIDI-nootnummer (0-127), v = velocity (0-127), hw = van hardware keyboard */
function nOn(mn, v, hw) {
  iA(); rA();         /* Zorg dat audio werkt */
  nOf(mn, true);      /* Stop eventuele dezelfde noot die al speelt */

  var p    = gP(instr);                              /* Haal het geluidsprofiel op */
  var freq = m2f(mn) * Math.pow(2, pb / 12);         /* Bereken frequentie inclusief pitch bend */
  var vv   = (v / 127) * vol;                        /* Zet velocity om naar volume (0.0-1.0) */
  var g    = aC.createGain();                        /* Maak een gain node voor deze noot */
  var now  = aC.currentTime;                         /* Huidige tijdstip in de AudioContext */

  /* Maak een laagdoorlaatfilter: maakt de klank zachter boven een bepaalde frequentie */
  var fl = aC.createBiquadFilter();
  fl.type            = 'lowpass';
  fl.frequency.value = Math.min(3800 + mn * 32, 17000); /* Hogere noten = helderder */
  fl.Q.value         = .7;
  fl.connect(g);    /* Filter → gain node */
  g.connect(mG);    /* Gain node → master volume */

  /* Stel de volume-envelop in (ADSR: Attack, Decay, Sustain, Release) */
  g.gain.setValueAtTime(0, now);                                    /* Start op 0 */
  g.gain.linearRampToValueAtTime(vv, now + p.a);                   /* Stijg naar volume (Attack) */
  g.gain.linearRampToValueAtTime(vv * p.s, now + p.a + p.d);       /* Daal naar sustain niveau */

  /* Maak oscillatoren aan voor elke boventoon (harmonische) */
  var os = p.h.map(function(amp, i) {
    var o  = aC.createOscillator(); /* Een oscillator maakt een toon */
    var hg = aC.createGain();       /* Gain voor deze boventoon */
    o.type           = p.t;                        /* Golfvorm */
    o.frequency.value = freq * (i + 1);            /* Grondtoon * (1, 2, 3, ...) */
    o.detune.value   = (i % 2 ? 1 : -1) * p.dt * i; /* Kleine toonverschillen voor dikte */
    hg.gain.value    = amp;                        /* Volume van deze boventoon */
    o.connect(hg);                                 /* Oscillator → boventoon-gain */
    hg.connect(fl);                                /* Boventoon-gain → filter */
    o.start(now);                                  /* Start de oscillator */
    return o;
  });

  /* Sla de actieve noot op zodat we hem later kunnen stoppen */
  aN[mn] = { g: g, os: os, p: p };
  kviz(mn, true);  /* Licht de toets op op het scherm */
  flash();         /* Laat het LED-lampje knipperen */

  /* Toon de nootnaam onderaan */
  document.getElementById('noteTxt').textContent =
    (hw ? '[HW] ' : '') + NN[mn % 12] + (Math.floor(mn / 12) - 1) + ' · MIDI ' + mn;
}

/* ── NOOT UIT ────────────────────────────────────────────────────
   Stop een noot.
   mn = MIDI-nootnummer, force = stop ook als sustain aan staat */
function nOf(mn, force) {
  if (!aN[mn]) return; /* Noot speelt niet? Niets te doen */
  if (sus && !force) { susH[mn] = true; return; } /* Sustain aan: bewaar voor later */

  var x   = aN[mn];
  var now = aC ? aC.currentTime : 0;

  /* Laat het volume langzaam wegvallen (Release) */
  x.g.gain.cancelScheduledValues(now);
  x.g.gain.setValueAtTime(x.g.gain.value, now);
  x.g.gain.linearRampToValueAtTime(0, now + x.p.r);

  /* Stop alle oscillatoren na de release-tijd */
  x.os.forEach(function(o) {
    try { o.stop(now + x.p.r + .05); } catch(e) {}
  });

  delete aN[mn];    /* Verwijder de noot uit het actieve noten-object */
  kviz(mn, false);  /* Zet de toets terug naar normale kleur */
}

/* Stop alle actieve noten tegelijk (bijv. bij model-wissel) */
function allOf() {
  Object.keys(aN).forEach(function(n) { nOf(+n, true); });
  susH = {};
}

/* Licht een piano-toets op of uit op het scherm */
function kviz(mn, on) {
  /* Zoek het HTML-element voor deze toets (-tr want het scherm toont de niet-getransponeerde toetsen) */
  var e = document.querySelector('[data-m="' + (mn - tr) + '"]');
  if (e) e.classList.toggle('on', on);
}

/* ── PIANO BOUWEN ────────────────────────────────────────────────
   Bouw het pianotoetsenbord in HTML op basis van het model.
   n = aantal toetsen, s = startende MIDI-nootnummer */
function buildKB(n, s) {
  var kb = document.getElementById('kb');
  kb.innerHTML = '';    /* Verwijder het oude toetsenbord */
  kb.style.height = WH + 'px'; /* Stel hoogte in */

  var wc = 0; /* Teller voor witte toetsen (bepaalt de totale breedte) */
  var ks = []; /* Array met informatie over elke toets */

  /* Ga door alle toetsen heen en bepaal of ze wit of zwart zijn */
  for (var i = 0; i < n; i++) {
    var m  = s + i;         /* MIDI-nootnummer van deze toets */
    var ni = m % 12;        /* Positie in het octaaf (0=C, 1=C#, etc.) */
    var ib = !!BP[ni];      /* Is het een zwarte toets? */
    if (!ib) wc++;           /* Tel witte toetsen */
    ks.push({ m: m, ni: ni, ib: ib });
  }

  /* Stel de totale breedte van het toetsenbord in */
  kb.style.width = (wc * WW) + 'px';

  var wx = 0; /* Horizontale positie van de volgende witte toets */

  /* Maak elk toets-element aan */
  ks.forEach(function(k) {
    var el = document.createElement('div');
    el.dataset.m = k.m; /* Sla het MIDI-nootnummer op als data-attribuut */

    if (!k.ib) {
      /* WITTE TOETS */
      el.className = 'wk';
      el.style.cssText = 'left:' + wx + 'px;width:' + WW + 'px;height:' + WH + 'px;';

      /* Voeg "C2", "C3" labels toe aan C-toetsen */
      if (NN[k.ni] === 'C') {
        var lb = document.createElement('span');
        lb.className   = 'k-lbl';
        lb.textContent = 'C' + (Math.floor(k.m / 12) - 1);
        el.appendChild(lb);
      }
      wx += WW; /* Ga naar de positie van de volgende witte toets */

    } else {
      /* ZWARTE TOETS */
      el.className = 'bk';
      /* Positioneer iets voor de volgende witte toets (overlap) */
      el.style.cssText = 'left:' + (wx - BW * .6) + 'px;width:' + BW + 'px;height:' + BH + 'px;top:0;';
    }

    /* Aanraak-events voor touchschermen */
    el.addEventListener('touchstart', function(e) { e.preventDefault(); kDn(k.m); }, { passive: false });
    el.addEventListener('touchend',   function(e) { e.preventDefault(); kUp(k.m); }, { passive: false });

    /* Muis-events voor desktop */
    el.addEventListener('mousedown',  function(e) { e.preventDefault(); kDn(k.m); });
    el.addEventListener('mouseup',    function()  { kUp(k.m); });
    el.addEventListener('mouseleave', function()  { if (aN[k.m + tr]) kUp(k.m); }); /* Loslaten bij weggaan */

    kb.appendChild(el); /* Voeg de toets toe aan het toetsenbord */
  });
}

/* Noot AAN via het klikken/aanraken van een piano-toets */
function kDn(m) {
  var f = m + tr; /* Voeg transpositie toe */
  if (f >= 0 && f <= 127) nOn(f, vel, false); /* Speel de noot */
}

/* Noot UIT als je de piano-toets loslaat */
function kUp(m) {
  nOf(m + tr); /* Stop de noot */
  document.getElementById('noteTxt').textContent = '— speel een toets —';
}

/* ── DRUM PADS ───────────────────────────────────────────────────
   Twee banken van 8 pads elk.
   n = naam, m = MIDI-nootnummer, c = kleur */
var BANKS = [
  /* Bank 1-8: standaard drumstel */
  [
    { n:'Kick',    m:36, c:'#c0392b' }, /* Bassdrum: rood */
    { n:'Snare',   m:38, c:'#8b6f3a' }, /* Snare: bruin */
    { n:'Hi-Hat',  m:42, c:'#2980b9' }, /* Hi-hat gesloten: blauw */
    { n:'Open HH', m:46, c:'#27ae60' }, /* Hi-hat open: groen */
    { n:'Tom L',   m:41, c:'#8e44ad' }, /* Lage tom: paars */
    { n:'Tom H',   m:50, c:'#d35400' }, /* Hoge tom: oranje */
    { n:'Crash',   m:49, c:'#c0392b' }, /* Crash cymbal: rood */
    { n:'Ride',    m:51, c:'#16a085' }  /* Ride cymbal: groenblauw */
  ],
  /* Bank 9-16: extra percussie */
  [
    { n:'Clap',    m:39, c:'#e67e22' },
    { n:'Rim',     m:37, c:'#2c3e50' },
    { n:'Tamb',    m:54, c:'#8e44ad' },
    { n:'Cowbell', m:56, c:'#c0392b' },
    { n:'Tom M',   m:45, c:'#27ae60' },
    { n:'Perc1',   m:60, c:'#2980b9' },
    { n:'Perc2',   m:61, c:'#d35400' },
    { n:'Splash',  m:55, c:'#16a085' }
  ]
];

/* Bouw de pad-knoppen in het HTML-raster */
function buildPads() {
  var g = document.getElementById('padsG');
  g.innerHTML = ''; /* Leegmaken */

  BANKS[bank].forEach(function(s, i) {
    var p  = document.createElement('div');
    p.className = 'pad';

    /* Gekleurde achtergrond van de pad */
    var bg = document.createElement('div');
    bg.className       = 'pad-bg';
    bg.style.background = s.c;
    p.appendChild(bg);

    /* Naam van het instrument */
    var nm = document.createElement('span');
    nm.className   = 'pad-name';
    nm.textContent = s.n;
    p.appendChild(nm);

    /* Padnummer (1-8 of 9-16) */
    var nb = document.createElement('span');
    nb.className   = 'pad-n';
    nb.textContent = (bank * 8 + i + 1);
    p.appendChild(nb);

    /* Aanraak-event */
    p.addEventListener('touchstart', function(e) { e.preventDefault(); padHit(p, s.m); }, { passive: false });
    /* Muis-event */
    p.addEventListener('mousedown', function() { padHit(p, s.m); });

    g.appendChild(p);
  });
}

/* Wissel tussen bank 1-8 en 9-16 */
function chBank() {
  bank = bank ? 0 : 1; /* Toggle: 0→1 of 1→0 */
  document.getElementById('bankBtn').textContent = bank ? 'Bank 9–16' : 'Bank 1–8';
  buildPads();
}

/* Verwerk een pad-treffer: visueel + geluid */
function padHit(pd, m) {
  iA(); rA();
  pd.classList.add('hit');                                 /* Animeer de pad ingedrukt */
  setTimeout(function() { pd.classList.remove('hit'); }, 110); /* Animatie terug na 110ms */
  pDrum(m); /* Speel het drumgeluid af */
  flash();  /* Knippert het LED */
}

/* Genereer drumgeluiden via Web Audio (zonder samples) */
function pDrum(m) {
  if (!aC) return;
  var now = aC.currentTime;
  var g   = aC.createGain();
  g.connect(mG); /* Verbind met master volume */

  if (m === 36) {
    /* KICK: sinusgolf die snel in toonhoogte daalt (van 160Hz naar 40Hz) */
    var o = aC.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(160, now);
    o.frequency.exponentialRampToValueAtTime(40, now + .15);
    g.gain.setValueAtTime(vol, now);
    g.gain.exponentialRampToValueAtTime(.001, now + .35);
    o.connect(g); o.start(now); o.stop(now + .36);

  } else if (m === 38 || m === 39) {
    /* SNARE / CLAP: ruis met bandpass-filter */
    var b = aC.createBuffer(1, Math.floor(aC.sampleRate * .25), aC.sampleRate);
    var d = b.getChannelData(0);
    for (var i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length) * .8;
    var src = aC.createBufferSource(); src.buffer = b;
    var f = aC.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 2000; f.Q.value = .5;
    src.connect(f); f.connect(g);
    g.gain.setValueAtTime(vol * .75, now);
    g.gain.exponentialRampToValueAtTime(.001, now + .25);
    src.start(now);

  } else if (m === 42 || m === 46 || m === 55) {
    /* HI-HAT / SPLASH: ruis met hogepass-filter */
    var b = aC.createBuffer(1, Math.floor(aC.sampleRate * .15), aC.sampleRate);
    var d = b.getChannelData(0);
    for (var i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    var src = aC.createBufferSource(); src.buffer = b;
    var f = aC.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = m === 46 ? 7000 : 10000;
    src.connect(f); f.connect(g);
    var dr = m === 46 ? .2 : .06; /* Open hi-hat klinkt langer */
    g.gain.setValueAtTime(vol * .45, now);
    g.gain.exponentialRampToValueAtTime(.001, now + dr);
    src.start(now);

  } else if (m === 49 || m === 51 || m === 57) {
    /* CRASH / RIDE CYMBAL: ruis met bandpass, langere decay */
    var b = aC.createBuffer(1, Math.floor(aC.sampleRate * .6), aC.sampleRate);
    var d = b.getChannelData(0);
    for (var i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / d.length * .8);
    var src = aC.createBufferSource(); src.buffer = b;
    var f = aC.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = m === 51 ? 5000 : 3500; f.Q.value = .3;
    src.connect(f); f.connect(g);
    g.gain.setValueAtTime(vol * .5, now);
    g.gain.exponentialRampToValueAtTime(.001, now + .6);
    src.start(now);

  } else {
    /* OVERIGE SLAGEN (toms, percussie): sinusgolf die daalt */
    var bf = 40 + (m - 36) * 6; /* Basistoonhoogte op basis van nootnummer */
    var o  = aC.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(bf * 2, now);
    o.frequency.exponentialRampToValueAtTime(bf, now + .08);
    g.gain.setValueAtTime(vol * .7, now);
    g.gain.exponentialRampToValueAtTime(.001, now + .3);
    o.connect(g); o.start(now); o.stop(now + .32);
  }
}

/* ── MODEL WISSELEN ──────────────────────────────────────────────*/
function setModel(n) {
  mdl = n;
  /* Update de knoppen: de actieve knop krijgt de 'mon' klasse */
  ['25','49','61','88'].forEach(function(x) {
    document.getElementById('m' + x).classList.toggle('mon', +x === n);
  });
  var c = MC[n];
  var s = c.s + octOff * 12; /* Startpositie inclusief octaafverschuiving */
  buildKB(c.n, s);           /* Herbouw het toetsenbord */
  allOf();                    /* Stop alle noten */
  updOct(s);                  /* Update de octaaf-weergave */
}

/* Verander het octaaf met d stapjes (+1 of -1) */
function chOct(d) {
  octOff = Math.max(-3, Math.min(3, octOff + d)); /* Begrens tussen -3 en +3 */
  var c  = MC[mdl];
  var s  = c.s + octOff * 12;
  buildKB(c.n, s);
  allOf();
  updOct(s);
}

/* Toon het huidige startoctaaf in de topbar */
function updOct(s) {
  document.getElementById('octV').textContent = NN[((s % 12) + 12) % 12] + (Math.floor(s / 12) - 1);
}

/* Verander de transpositie (halve tonen) */
function chTr(d) {
  tr = Math.max(-12, Math.min(12, tr + d)); /* Begrens tussen -12 en +12 halve tonen */
  document.getElementById('trV').textContent = (tr > 0 ? '+' : '') + tr;
}

/* Verander het volume */
function chVol(v) {
  vol = v / 100; /* Zet 0-100 om naar 0.0-1.0 */
  if (mG) mG.gain.value = vol; /* Pas de master gain aan */
  document.getElementById('volV').textContent = v;
}

/* Wissel het instrument (GM programmanummer) */
function setInstr(v) {
  instr = +v;
  allOf(); /* Stop alle noten die de oude klank gebruiken */
}

/* Schakel sustain aan of uit */
function chSus() {
  sus = !sus;
  document.getElementById('susBtn').classList.toggle('on', sus);
  if (!sus) {
    /* Sustain uitgeschakeld: stop alle vastgehouden noten */
    Object.keys(susH).forEach(function(n) { nOf(+n, true); });
    susH = {};
  }
}

/* ── TOUCH STRIPS (Pitch Bend en Modulatie) ──────────────────────*/

/* Start slepen op een strip */
function sS(e, t) {
  e.preventDefault();
  sDr[t] = true; /* Markeer als sleepbezig */
  sM(e, t);      /* Verwerk de huidige positie direct */
}

/* Verwerk slepen (bewegen van vinger/muis op een strip) */
function sM(e, t) {
  if (!sDr[t]) return; /* Niet aan het slepen? Niets te doen */
  var el    = document.getElementById(t === 'p' ? 'pitchS' : 'modS');
  var r     = el.getBoundingClientRect(); /* Positie en afmetingen van de strip */
  var cy    = e.touches ? e.touches[0].clientY : e.clientY; /* Huidige Y-positie */
  var ratio = Math.max(0, Math.min(1, (r.bottom - cy) / r.height)); /* 0=onderaan, 1=bovenaan */

  if (t === 'p') {
    /* Pitch Bend: 0=beneden (toon lager), 0.5=midden (normaal), 1=boven (toon hoger) */
    pb = (ratio - .5) * 4; /* Omzetten naar -2 tot +2 octaven */
    document.getElementById('pitchF').style.height = (ratio * 100) + '%';
  } else {
    /* Modulatie: sleept van 0% (geen effect) tot 100% (maximum effect) */
    document.getElementById('modF').style.height = (ratio * 100) + '%';
  }
}

/* Beëindig het slepen op een strip */
function sE(e, t) {
  sDr[t] = false;
  if (t === 'p') {
    /* Pitch Bend: veert terug naar het midden */
    pb = 0;
    document.getElementById('pitchF').style.height = '50%';
  }
  /* Modulatie behoudt zijn positie (zoals de echte VersaKey werkt) */
}

/* Muis loslaten buiten een strip: stop slepen */
document.addEventListener('mouseup', function() { sDr = {}; });

/* Muisbewegen: verwerk strip-slepen ook als muis buiten het element is */
document.addEventListener('mousemove', function(e) {
  if (sDr.p) sM(e, 'p');
  if (sDr.m) sM(e, 'm');
});

/* ── COMPUTER TOETSENBORD MAPPING ────────────────────────────────
   Speel noten via het computertoetsenbord (handig voor testen)
   a=C, w=C#, s=D, e=D#, d=E, f=F, t=F#, g=G, y=G#, h=A, u=A#, j=B
   k=C (hogere octaaf), etc. */
var KBM = {
  'a':'C', 'w':'C#', 's':'D', 'e':'D#', 'd':'E', 'f':'F',
  't':'F#', 'g':'G', 'y':'G#', 'h':'A', 'u':'A#', 'j':'B',
  'k':'C2', 'o':'C#2', 'l':'D2', 'p':'D#2'
};
var kbP = {}; /* Bijhouden welke toetsen ingedrukt zijn (om herhaling te voorkomen) */

/* Toetsenbord indrukken */
document.addEventListener('keydown', function(e) {
  if (e.repeat) return; /* Automatische herhaling van OS negeren */
  if (['SELECT','INPUT'].includes(e.target.tagName)) return; /* Niet in tekstvelden */
  if (e.key === ' ') { e.preventDefault(); chSus(); return; } /* Spatie = sustain */

  var no = KBM[e.key.toLowerCase()];
  if (!no || kbP[e.key]) return; /* Niet in mapping of al ingedrukt */
  kbP[e.key] = true;

  var is2 = no.endsWith('2'); /* Is het een toets van het hogere octaaf? */
  var nm  = is2 ? no.slice(0, -1) : no;
  var ni  = NN.indexOf(nm);
  if (ni < 0) return;

  var s  = MC[mdl].s + octOff * 12;
  var bo = Math.floor(s / 12) - 1; /* Basisoctaaf */
  var mn = (bo + (is2 ? 2 : 1)) * 12 + ni + tr; /* MIDI-nootnummer */
  if (mn >= 0 && mn <= 127) nOn(mn, vel, false);
});

/* Toetsenbord loslaten */
document.addEventListener('keyup', function(e) {
  var no = KBM[e.key.toLowerCase()];
  if (!no) return;
  delete kbP[e.key];
  var is2 = no.endsWith('2');
  var nm  = is2 ? no.slice(0, -1) : no;
  var ni  = NN.indexOf(nm);
  if (ni < 0) return;
  var s  = MC[mdl].s + octOff * 12;
  var bo = Math.floor(s / 12) - 1;
  var mn = (bo + (is2 ? 2 : 1)) * 12 + ni + tr;
  nOf(mn);
  document.getElementById('noteTxt').textContent = '— speel een toets —';
});

/* ── MIDI VIA WEB MIDI API (USB-KABEL) ───────────────────────────
   De Web MIDI API werkt in Chrome en Edge op Windows en Android.
   De VersaKey moet verbonden zijn via USB-kabel. */

/* Start de MIDI-verbinding op */
async function initMidi() {
  var b = document.getElementById('midiBadge');
  var l = document.getElementById('midiLbl');
  var hint = document.getElementById('usbHint');
  var hintDetail = document.getElementById('usbHintDetail');

  /* Controleer of de browser de Web MIDI API ondersteunt */
  if (!navigator.requestMIDIAccess) {
    b.className = 'midi-badge err';
    l.textContent = 'MIDI: niet ondersteund';
    hint.classList.add('show');
    hintDetail.textContent = '→ Gebruik Chrome of Edge (Firefox ondersteunt geen USB-MIDI).';
    console.warn('[VersaKey] Web MIDI API niet beschikbaar in deze browser');
    return;
  }

  try {
    /* Vraag toegang tot MIDI-apparaten (sysex=false = geen systeemberichten nodig) */
    mAcc = await navigator.requestMIDIAccess({ sysex: false });
    console.log('[VersaKey] MIDI toegang verkregen, zoek naar apparaten...');

    /* Luister naar apparaatwijzigingen (USB in-/uitprikken) */
    mAcc.onstatechange = function(e) {
      console.log('[VersaKey] MIDI status gewijzigd:', e.port.name, e.port.state);
      updMidi();
    };

    updMidi(); /* Verwerk de beschikbare apparaten direct */

  } catch (ex) {
    /* Gebruiker heeft MIDI-toegang geweigerd */
    b.className = 'midi-badge err';
    l.textContent = 'MIDI: geweigerd';
    hint.classList.add('show');
    hintDetail.textContent = '→ Klik op "Toestaan" als de browser vraagt om MIDI-toegang.';
    console.error('[VersaKey] MIDI toegang geweigerd:', ex);
  }
}

/* Vernieuw de lijst van MIDI-apparaten */
function updMidi() {
  if (!mAcc) return;

  /* Verzamel alle invoerapparaten */
  mIns = [];
  mAcc.inputs.forEach(function(i) { mIns.push(i); });

  var b    = document.getElementById('midiBadge');
  var l    = document.getElementById('midiLbl');
  var bar  = document.getElementById('midiBar');
  var sel  = document.getElementById('midiSel');
  var hint = document.getElementById('usbHint');
  var hintDetail = document.getElementById('usbHintDetail');

  /* Stop alle bestaande MIDI-luisteraars */
  mIns.forEach(function(i) { i.onmidimessage = null; });

  if (mIns.length === 0) {
    /* Geen MIDI-apparaten gevonden */
    b.className  = 'midi-badge';
    l.textContent = 'MIDI: geen apparaat';
    bar.classList.remove('show');
    hint.classList.add('show');
    hintDetail.textContent = '→ Sluit je VersaKey aan via USB en probeer opnieuw.';
    actIn = null;
    console.log('[VersaKey] Geen MIDI-apparaten gevonden');
    return;
  }

  /* Apparaten gevonden: verberg de hint en vul de dropdown */
  hint.classList.remove('show');
  sel.innerHTML = '<option value="">— kies MIDI apparaat —</option>';
  mIns.forEach(function(inp, i) {
    var o = document.createElement('option');
    o.value       = i;
    o.textContent = inp.name;
    sel.appendChild(o);
  });
  bar.classList.add('show');

  /* Zoek automatisch naar een VersaKey of Devine apparaat */
  var idx = mIns.findIndex(function(d) {
    return d.name.toLowerCase().includes('versa') ||
           d.name.toLowerCase().includes('devine');
  });
  if (idx < 0) idx = 0; /* Geen VersaKey gevonden? Gebruik het eerste apparaat */

  sel.value = idx;
  pickMidi(idx); /* Selecteer en verbind het apparaat */

  console.log('[VersaKey] MIDI apparaten gevonden:', mIns.map(function(d) { return d.name; }));
}

/* Opnieuw scannen (bij klikken op de badge) */
function scanMidi() { updMidi(); }

/* Selecteer een MIDI-invoerapparaat */
function pickMidi(idx) {
  /* Stop alle bestaande MIDI-luisteraars */
  mIns.forEach(function(i) { i.onmidimessage = null; });
  actIn = null;
  document.getElementById('midiInfo').textContent = '';

  if (idx === '' || idx === null || idx === undefined) return;

  var inp = mIns[parseInt(idx)];
  if (!inp) return;

  /* Verbind het geselecteerde apparaat */
  actIn = inp;
  inp.onmidimessage = onMidi; /* Stel de callback in voor inkomende MIDI-berichten */

  /* Update de UI */
  document.getElementById('midiBadge').className = 'midi-badge ok';
  document.getElementById('midiLbl').textContent =
    inp.name.length > 22 ? inp.name.slice(0, 20) + '…' : inp.name;
  document.getElementById('midiInfo').textContent = 'verbonden';
  document.getElementById('devTxt').textContent   = inp.name;

  console.log('[VersaKey] Verbonden met MIDI-apparaat:', inp.name);
}

/* Verwerk inkomend MIDI-bericht van het hardware keyboard */
function onMidi(ev) {
  /* MIDI-berichten bestaan uit 2 of 3 bytes:
     ev.data[0] = status byte (type + kanaal)
     ev.data[1] = data byte 1 (nootnummer of CC-nummer)
     ev.data[2] = data byte 2 (velocity of CC-waarde) */
  var cmd = ev.data[0] & 0xF0; /* Status: bovenste 4 bits = berichttype */
  var d1  = ev.data[1];         /* Nootnummer of CC-nummer */
  var d2  = ev.data[2];         /* Velocity of waarde */

  iA(); rA(); /* Zorg dat audio werkt */

  if (cmd === 0x90 && d2 > 0) {
    /* NOTE ON: noot ingedrukt */
    var f = d1 + tr; /* Voeg transpositie toe */
    if (f >= 0 && f <= 127) nOn(f, d2, true); /* Speel de noot met hardware-vlag */

  } else if (cmd === 0x80 || (cmd === 0x90 && d2 === 0)) {
    /* NOTE OFF: noot losgelaten (0x80 of Note On met velocity 0) */
    nOf(d1 + tr);
    document.getElementById('noteTxt').textContent = '— speel een toets —';

  } else if (cmd === 0xB0) {
    /* CONTROL CHANGE: een knop/slider/pedaal is bewogen */
    if (d1 === 64) {
      /* CC64 = Sustain pedaal: >= 64 is aan, < 64 is uit */
      sus = d2 >= 64;
      document.getElementById('susBtn').classList.toggle('on', sus);
      if (!sus) {
        Object.keys(susH).forEach(function(n) { nOf(+n, true); });
        susH = {};
      }
    } else if (d1 === 1) {
      /* CC1 = Modulatiewiel: update de Mod-strip visueel */
      document.getElementById('modF').style.height = (d2 / 127 * 100) + '%';
    } else if (d1 === 7) {
      /* CC7 = Volume: update het volume */
      var v = Math.round(d2 / 127 * 100);
      vol = v / 100;
      if (mG) mG.gain.value = vol;
      document.getElementById('volV').textContent = v;
    }

  } else if (cmd === 0xE0) {
    /* PITCH BEND: toonhoogte buigen
       Twee bytes samen vormen een 14-bits waarde: -8192 (laag) tot +8191 (hoog) */
    var bend = ((d2 << 7) | d1) - 8192;
    pb = (bend / 8192) * 2; /* Omzetten naar -2 tot +2 octaven */
    document.getElementById('pitchF').style.height = (((bend + 8192) / 16384) * 100) + '%';
  }

  flash(); /* Laat het LED knipperen */
}

/* ── LED LAMPJE ─────────────────────────────────────────────────
   Knippert groen bij elke MIDI-activiteit */
var ledT; /* Timer voor het uitschakelen van het LED */
function flash() {
  var l = document.getElementById('led');
  l.classList.add('f');                                  /* Zet groen LED aan */
  clearTimeout(ledT);                                    /* Reset de timer */
  ledT = setTimeout(function() { l.classList.remove('f'); }, 120); /* Uit na 120ms */
}

/* ── SERVICE WORKER (PWA offline) ───────────────────────────────
   Registreer de service worker zodat de app ook offline werkt */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js')
      .then(function(reg) { console.log('[VersaKey] Service Worker geregistreerd:', reg.scope); })
      .catch(function(err) { console.warn('[VersaKey] Service Worker mislukt:', err); });
  });
}

/* ── INITIALISATIE ───────────────────────────────────────────────
   Start de app op als de pagina geladen is */
buildPads();    /* Maak de drum-pads */
setModel(49);  /* Laad het standaard VK-49 model */
initMidi();    /* Start de USB-MIDI verbinding */

console.log('[VersaKey] App gestart — v' + APP_VERSION + ' | Verbind je VersaKey via USB');
</script>
