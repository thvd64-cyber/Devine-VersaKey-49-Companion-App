<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="VersaKey Visualizer">
<meta name="theme-color" content="#f0ebe0">
<title>Devine VersaKey — Visual Companion</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f0ebe0; --surface:#e8e2d4; --surface2:#ddd8cc; --surface3:#ccc6b8;
  --accent:#8b6f3a; --text:#2a2520; --muted:#7a7060; --dim:#b0a898;
  --border:rgba(139,111,58,.18); --ok:#27ae60; --err:#e74c3c;
  --wk:#faf8f3; --bk:#1c1a18;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;user-select:none;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* TOP BAR */
.topbar{display:flex;align-items:center;gap:8px;padding:9px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.logo{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--accent);letter-spacing:.07em;}
.logo-sub{font-size:10px;color:var(--muted);}
.sep{width:1px;height:20px;background:var(--border);flex-shrink:0;}
.midi-dot{width:8px;height:8px;border-radius:50%;background:var(--dim);transition:all .2s;flex-shrink:0;}
.midi-dot.ok{background:var(--ok);box-shadow:0 0 6px var(--ok);}
.midi-dot.err{background:var(--err);}
.midi-lbl{font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;cursor:pointer;white-space:nowrap;}
.midi-lbl.ok{color:var(--ok);font-weight:700;}
.midi-sel{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:3px 8px;border-radius:6px;font-size:11px;outline:none;cursor:pointer;max-width:200px;touch-action:auto;display:none;}
.midi-sel.show{display:block;}

/* CHORD BAR */
.chord-bar{display:flex;align-items:center;gap:16px;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.chord-main{min-width:130px;}
.chord-name{font-family:'Space Mono',monospace;font-size:32px;font-weight:700;color:var(--text);line-height:1;letter-spacing:.02em;}
.chord-type{font-size:12px;color:var(--muted);margin-top:3px;}
.notes-area{display:flex;gap:5px;flex-wrap:wrap;flex:1;}
.npill{padding:3px 9px;border-radius:20px;font-size:11px;font-family:'Space Mono',monospace;font-weight:700;background:rgba(139,111,58,.12);color:var(--accent);border:1px solid rgba(139,111,58,.25);}
.npill.root{background:rgba(139,111,58,.3);color:var(--text);border-color:var(--accent);}
.stats-area{display:flex;gap:14px;margin-left:auto;}
.stat{text-align:center;}
.stat-v{font-family:'Space Mono',monospace;font-size:18px;font-weight:700;color:var(--text);}
.stat-l{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;}

/* PIANO ROLL */
.roll-section{flex-shrink:0;position:relative;border-bottom:1px solid var(--border);}
.roll-header{display:flex;align-items:center;gap:8px;padding:5px 16px;background:var(--surface2);}
.roll-lbl{font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:.05em;}
.roll-speed{display:flex;align-items:center;gap:6px;}
.rng{-webkit-appearance:none;height:3px;border-radius:2px;background:var(--surface3);outline:none;width:70px;accent-color:var(--accent);}
.rng::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--accent);cursor:pointer;}
canvas{display:block;width:100%;background:var(--bg);}

/* KEYBOARD */
.kb-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:12px 16px 10px;overflow:hidden;}
.kb-scroll{overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:thin;scrollbar-color:var(--surface3) transparent;}
.kb-scroll::-webkit-scrollbar{height:3px;}
.kb-scroll::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:2px;}
.keyboard{position:relative;display:inline-block;}
.wk{position:absolute;bottom:0;border-radius:0 0 4px 4px;cursor:pointer;z-index:1;display:flex;align-items:flex-end;justify-content:center;padding-bottom:4px;border:1px solid #c8bfb0;transition:background .04s,box-shadow .04s;}
.bk{position:absolute;top:0;border-radius:0 0 3px 3px;cursor:pointer;z-index:2;border:1px solid #000;box-shadow:2px 3px 5px rgba(0,0,0,.35);transition:background .04s;}
.k-lbl{font-size:8px;color:#999;font-family:'Space Mono',monospace;}

/* MODEL BAR */
.model-bar{display:flex;align-items:center;gap:6px;padding:7px 16px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;flex-wrap:wrap;}
.lbl{font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;}
.mbtn{padding:4px 9px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--muted);font-size:11px;font-family:'Space Mono',monospace;cursor:pointer;transition:all .12s;}
.mbtn:hover{border-color:var(--accent);color:var(--accent);}
.mbtn.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.obtn{padding:4px 8px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:12px;cursor:pointer;transition:all .12s;}
.obtn:hover{border-color:var(--accent);}
.oval{font-family:'Space Mono',monospace;font-size:11px;color:var(--accent);min-width:24px;text-align:center;}
.clr-btn{padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--muted);font-size:11px;cursor:pointer;margin-left:auto;}
.clr-btn:hover{border-color:var(--err);color:var(--err);}

@media(max-width:600px){
  .chord-name{font-size:24px;}
  .stats-area{gap:8px;}
  .stat-v{font-size:14px;}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div>
    <div class="logo">DEVINE VersaKey</div>
    <div class="logo-sub">Visual Companion</div>
  </div>
  <div class="sep"></div>
  <div class="midi-dot" id="mDot"></div>
  <span class="midi-lbl" id="mLbl" onclick="scanMidi()">MIDI: scannen…</span>
  <select class="midi-sel" id="mSel" onchange="pickMidi(this.value)">
    <option value="">— kies apparaat —</option>
  </select>
  <div class="sep"></div>
  <span style="font-size:10px;color:var(--muted);">Gebruik Chrome voor hardware MIDI · Synth One J6 voor geluid</span>
</div>

<!-- CHORD / NOTE INFO -->
<div class="chord-bar">
  <div class="chord-main">
    <div class="chord-name" id="chordName">—</div>
    <div class="chord-type" id="chordType">Speel een noot of akkoord…</div>
  </div>
  <div class="notes-area" id="notePills"></div>
  <div class="stats-area">
    <div class="stat"><div class="stat-v" id="sN">0</div><div class="stat-l">Noten</div></div>
    <div class="stat"><div class="stat-v" id="sO">—</div><div class="stat-l">Noot</div></div>
    <div class="stat"><div class="stat-v" id="sV">—</div><div class="stat-l">Velocity</div></div>
    <div class="stat"><div class="stat-v" id="sOct">—</div><div class="stat-l">Octaaf</div></div>
  </div>
</div>

<!-- PIANO ROLL -->
<div class="roll-section">
  <div class="roll-header">
    <span class="roll-lbl">Piano Roll</span>
    <div class="roll-speed" style="margin-left:auto;">
      <span class="roll-lbl">Snelheid</span>
      <input type="range" class="rng" min="20" max="200" value="60" step="1" oninput="setSpeed(this.value)">
    </div>
  </div>
  <canvas id="roll" height="130"></canvas>
</div>

<!-- KEYBOARD -->
<div class="kb-wrap">
  <div class="kb-scroll">
    <div class="keyboard" id="kb"></div>
  </div>
</div>

<!-- MODEL BAR -->
<div class="model-bar">
  <span class="lbl">Model</span>
  <button class="mbtn" id="b25" onclick="setModel(25)">VK-25</button>
  <button class="mbtn on" id="b49" onclick="setModel(49)">VK-49</button>
  <button class="mbtn" id="b61" onclick="setModel(61)">VK-61</button>
  <button class="mbtn" id="b88" onclick="setModel(88)">VK-88</button>
  <div class="sep"></div>
  <span class="lbl">Octaaf</span>
  <button class="obtn" onclick="chOct(-1)">−</button>
  <span class="oval" id="octV">C2</span>
  <button class="obtn" onclick="chOct(1)">+</button>
  <div class="sep"></div>
  <span class="lbl" id="devLbl" style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></span>
  <button class="clr-btn" onclick="clearRoll()">Roll wissen</button>
</div>

<script>
// ═══ CONSTANTS ═══
var NN=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
var BP=[0,1,0,1,0,0,1,0,1,0,1,0];
var MC={25:{s:48,n:25},49:{s:36,n:49},61:{s:36,n:61},88:{s:21,n:88}};
var WW=34,WH=160,BW=21,BH=98;
var mdl=49,octOff=0;
var held={},lastVel=0,noteCount=0;
var mAcc=null,mIns=[],actIn=null;

// ═══ PIANO ROLL ═══
var canvas=document.getElementById('roll');
var ctx=canvas.getContext('2d');
var rollW=0,rollH=130,speed=60;
var rollNotes=[];
var lastTs=null;
var LO=21,HI=108;

function resizeRoll(){
  rollW=canvas.offsetWidth;
  canvas.width=rollW*devicePixelRatio;
  canvas.height=rollH*devicePixelRatio;
  ctx.scale(devicePixelRatio,devicePixelRatio);
}

function noteY(m){return rollH-((m-LO)/(HI-LO))*rollH;}
function noteH2(){return Math.max(2,rollH/(HI-LO)*1.6);}

function noteColor(midi,alpha){
  var hue=Math.round(((midi-36)%12/12)*300+180);
  return 'hsla('+hue+',65%,55%,'+alpha+')';
}

function drawRoll(ts){
  if(!lastTs)lastTs=ts;
  var dt=Math.min((ts-lastTs)/1000,.05);lastTs=ts;

  ctx.clearRect(0,0,rollW,rollH);

  // background grid
  ctx.fillStyle='rgba(240,235,224,1)';
  ctx.fillRect(0,0,rollW,rollH);

  // octave lines
  for(var m=24;m<=108;m+=12){
    var y=noteY(m);
    ctx.strokeStyle='rgba(139,111,58,.12)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(rollW,y);ctx.stroke();
    ctx.fillStyle='rgba(139,111,58,.35)';
    ctx.font='8px "Space Mono",monospace';
    ctx.fillText('C'+(Math.floor(m/12)-1),3,y-2);
  }

  // black key rows (subtle background)
  for(var m=LO;m<=HI;m++){
    if(BP[m%12]){
      var y=noteY(m);var nh=noteH2();
      ctx.fillStyle='rgba(0,0,0,.04)';
      ctx.fillRect(0,y-nh/2,rollW,nh);
    }
  }

  // move & draw notes
  var alive=[];
  for(var i=0;i<rollNotes.length;i++){
    var n=rollNotes[i];
    if(!n.active) n.x-=speed*dt;
    if(n.active) n.w=rollW-n.x0;
    if(n.x+n.w>0||n.active) alive.push(n);
  }
  rollNotes=alive;

  for(var i=0;i<rollNotes.length;i++){
    var n=rollNotes[i];
    var y=noteY(n.midi);
    var nh=noteH2();
    var x=n.active?n.x0:n.x;
    var w=n.active?(rollW-n.x0):n.w;
    var alpha=n.active?0.9:Math.max(0.15,(x+w)/rollW*0.9);
    ctx.fillStyle=noteColor(n.midi,alpha);
    ctx.beginPath();
    ctx.roundRect(x,y-nh/2,w,nh,2);
    ctx.fill();
    // note label on wide notes
    if(w>24){
      ctx.fillStyle='rgba(255,255,255,0.85)';
      ctx.font='bold 9px "Space Mono",monospace';
      ctx.fillText(NN[n.midi%12],x+4,y+3);
    }
  }

  // playhead line
  ctx.strokeStyle='rgba(139,111,58,.5)';ctx.lineWidth=1.5;
  ctx.setLineDash([4,3]);
  ctx.beginPath();ctx.moveTo(rollW-2,0);ctx.lineTo(rollW-2,rollH);ctx.stroke();
  ctx.setLineDash([]);

  requestAnimationFrame(drawRoll);
}

resizeRoll();
new ResizeObserver(resizeRoll).observe(canvas);
requestAnimationFrame(drawRoll);

function setSpeed(v){speed=+v;}
function clearRoll(){rollNotes=[];}

// ═══ KEYBOARD VISUAL ═══
function buildKB(n,s){
  var kb=document.getElementById('kb');kb.innerHTML='';
  kb.style.height=WH+'px';
  var wc=0,ks=[];
  for(var i=0;i<n;i++){var m=s+i,ni=m%12,ib=!!BP[ni];if(!ib)wc++;ks.push({m:m,ni:ni,ib:ib});}
  kb.style.width=(wc*WW)+'px';
  var wx=0;
  ks.forEach(function(k){
    var el=document.createElement('div');el.dataset.m=k.m;
    if(!k.ib){
      el.className='wk';
      el.style.cssText='left:'+wx+'px;width:'+WW+'px;height:'+WH+'px;background:var(--wk);';
      if(NN[k.ni]==='C'){var lb=document.createElement('span');lb.className='k-lbl';lb.textContent='C'+(Math.floor(k.m/12)-1);el.appendChild(lb);}
      wx+=WW;
    } else {
      el.className='bk';
      el.style.cssText='left:'+(wx-BW*.6)+'px;width:'+BW+'px;height:'+BH+'px;top:0;background:var(--bk);';
    }
    // Click/touch to test
    el.addEventListener('mousedown',function(){noteOn(k.m,90,false);});
    el.addEventListener('mouseup',function(){noteOff(k.m);});
    el.addEventListener('mouseleave',function(){if(held[k.m])noteOff(k.m);});
    el.addEventListener('touchstart',function(e){e.preventDefault();noteOn(k.m,90,false);},{passive:false});
    el.addEventListener('touchend',function(e){e.preventDefault();noteOff(k.m);},{passive:false});
    kb.appendChild(el);
  });
  // Re-highlight held notes
  Object.keys(held).forEach(function(m){if(held[m])kviz(+m,true);});
}

function kviz(midi,on){
  var el=document.querySelector('[data-m="'+midi+'"]');
  if(!el)return;
  var isBlack=!!BP[midi%12];
  if(on){
    var hue=Math.round(((midi-36)%12/12)*300+180);
    el.style.background='hsl('+hue+',65%,'+(isBlack?'42':'60')+'%)';
    el.style.boxShadow='0 0 12px hsla('+hue+',70%,55%,.5)';
  } else {
    el.style.background=isBlack?'var(--bk)':'var(--wk)';
    el.style.boxShadow='';
  }
}

// ═══ CHORD DETECTION ═══
var CHORDS=[
  {n:'',t:'Majeur',i:[0,4,7]},
  {n:'m',t:'Mineur',i:[0,3,7]},
  {n:'dim',t:'Verminderd',i:[0,3,6]},
  {n:'aug',t:'Vergroot',i:[0,4,8]},
  {n:'sus2',t:'Suspended 2',i:[0,2,7]},
  {n:'sus4',t:'Suspended 4',i:[0,5,7]},
  {n:'maj7',t:'Majeur 7e',i:[0,4,7,11]},
  {n:'m7',t:'Mineur 7e',i:[0,3,7,10]},
  {n:'7',t:'Dominant 7e',i:[0,4,7,10]},
  {n:'dim7',t:'Verminderd 7e',i:[0,3,6,9]},
  {n:'m7b5',t:'Half verminderd',i:[0,3,6,10]},
  {n:'maj9',t:'Majeur 9e',i:[0,4,7,11,14]},
  {n:'9',t:'9e',i:[0,4,7,10,14]},
  {n:'add9',t:'Toegevoegde 9e',i:[0,4,7,14]},
  {n:'m9',t:'Mineur 9e',i:[0,3,7,10,14]},
  {n:'6',t:'6e akkoord',i:[0,4,7,9]},
  {n:'m6',t:'Mineur 6e',i:[0,3,7,9]},
  {n:'11',t:'11e',i:[0,4,7,10,14,17]},
  {n:'5',t:'Kwint / Power',i:[0,7]},
];

function detectChord(midis){
  if(midis.length<1)return null;
  if(midis.length===1)return{root:midis[0]%12,name:NN[midis[0]%12],type:'Enkele noot',rootPc:midis[0]%12,single:true};
  var pcs=[];
  midis.forEach(function(m){if(pcs.indexOf(m%12)<0)pcs.push(m%12);});
  var best=null,bestScore=0;
  for(var root=0;root<12;root++){
    var ivs=pcs.map(function(p){return((p-root)+12)%12;}).sort(function(a,b){return a-b;});
    for(var ci=0;ci<CHORDS.length;ci++){
      var ch=CHORDS[ci];
      if(ch.i.length!==ivs.length)continue;
      var ok=true;
      for(var j=0;j<ch.i.length;j++)if(ch.i[j]!==ivs[j]){ok=false;break;}
      if(ok&&ch.i.length>bestScore){bestScore=ch.i.length;best={root:root,rootPc:root,name:NN[root]+ch.n,type:ch.t,chord:ch};}
    }
  }
  if(!best){
    // partial match
    for(var root=0;root<12;root++){
      var ivs=pcs.map(function(p){return((p-root)+12)%12;}).sort(function(a,b){return a-b;});
      for(var ci=0;ci<CHORDS.length;ci++){
        var ch=CHORDS[ci];
        var matches=0;
        ch.i.forEach(function(iv){if(ivs.indexOf(iv)>=0)matches++;});
        var score=matches/Math.max(ch.i.length,ivs.length);
        if(score>=0.7&&matches>bestScore){bestScore=matches;best={root:root,rootPc:root,name:NN[root]+ch.n,type:ch.t+' (gedeeltelijk)',chord:ch,partial:true};}
      }
    }
  }
  if(!best&&pcs.length>=2)best={root:pcs[0],rootPc:pcs[0],name:'?',type:pcs.length+' noten (onbekend akkoord)'};
  return best;
}

// ═══ NOTE ON/OFF ═══
function noteOn(midi,vel,fromHW){
  if(held[midi])return;
  held[midi]=true;lastVel=vel;
  noteCount=Object.keys(held).filter(function(k){return held[k];}).length;
  kviz(midi,true);
  // Piano roll
  rollNotes.push({midi:midi,x0:rollW-2,x:rollW-2,w:0,active:true});
  updateUI();
}

function noteOff(midi){
  if(!held[midi])return;
  held[midi]=false;
  noteCount=Object.keys(held).filter(function(k){return held[k];}).length;
  kviz(midi,false);
  // End roll note
  var n=rollNotes.slice().reverse().find(function(r){return r.midi===midi&&r.active;});
  if(n){n.active=false;n.w=rollW-n.x0;n.x=n.x0;}
  updateUI();
}

function updateUI(){
  var midis=Object.keys(held).map(Number).filter(function(m){return held[m];}).sort(function(a,b){return a-b;});
  var count=midis.length;
  document.getElementById('sN').textContent=count;
  if(count>0){
    var top=midis[midis.length-1];
    document.getElementById('sO').textContent=NN[top%12]+(Math.floor(top/12)-1);
    document.getElementById('sV').textContent=lastVel;
    document.getElementById('sOct').textContent='Oct '+(Math.floor(midis[0]/12)-1);
  } else {
    document.getElementById('sO').textContent='—';
    document.getElementById('sV').textContent='—';
    document.getElementById('sOct').textContent='—';
  }

  // Chord
  var ch=detectChord(midis);
  if(ch){
    document.getElementById('chordName').textContent=ch.name||'—';
    document.getElementById('chordType').textContent=ch.type||'';
  } else {
    document.getElementById('chordName').textContent='—';
    document.getElementById('chordType').textContent='Speel een noot of akkoord…';
  }

  // Pills
  var pills=document.getElementById('notePills');pills.innerHTML='';
  midis.forEach(function(m){
    var p=document.createElement('span');
    p.className='npill'+(ch&&(m%12)===ch.rootPc?' root':'');
    p.textContent=NN[m%12]+(Math.floor(m/12)-1);
    pills.appendChild(p);
  });
}

// ═══ MIDI ═══
async function initMidi(){
  var dot=document.getElementById('mDot'),lbl=document.getElementById('mLbl');
  if(!navigator.requestMIDIAccess){
    lbl.textContent='MIDI: niet ondersteund in deze browser';dot.classList.add('err');return;
  }
  try{
    mAcc=await navigator.requestMIDIAccess({sysex:false});
    mAcc.onstatechange=updMidi;updMidi();
  }catch(ex){
    dot.classList.add('err');lbl.textContent='MIDI: toegang geweigerd';
  }
}
function updMidi(){
  if(!mAcc)return;
  mIns=[];mAcc.inputs.forEach(function(i){mIns.push(i);});
  var dot=document.getElementById('mDot'),lbl=document.getElementById('mLbl');
  var sel=document.getElementById('mSel'),dev=document.getElementById('devLbl');
  mIns.forEach(function(i){i.onmidimessage=null;});
  sel.innerHTML='<option value="">— kies apparaat —</option>';
  if(mIns.length===0){dot.className='midi-dot';lbl.className='midi-lbl';lbl.textContent='MIDI: geen apparaat';sel.classList.remove('show');actIn=null;dev.textContent='';return;}
  mIns.forEach(function(inp,i){var o=document.createElement('option');o.value=i;o.textContent=inp.name;sel.appendChild(o);});
  sel.classList.add('show');
  var idx=mIns.findIndex(function(d){return d.name.toLowerCase().includes('versa')||d.name.toLowerCase().includes('devine');});
  if(idx<0)idx=0;sel.value=idx;pickMidi(idx);
}
function scanMidi(){updMidi();}
function pickMidi(idx){
  mIns.forEach(function(i){i.onmidimessage=null;});actIn=null;
  if(idx===''||idx===null)return;
  var inp=mIns[parseInt(idx)];if(!inp)return;
  actIn=inp;inp.onmidimessage=onMidi;
  document.getElementById('mDot').className='midi-dot ok';
  document.getElementById('mLbl').className='midi-lbl ok';
  document.getElementById('mLbl').textContent=inp.name.length>26?inp.name.slice(0,24)+'…':inp.name;
  document.getElementById('devLbl').textContent='verbonden';
}
function onMidi(ev){
  var cmd=ev.data[0]&0xF0,d1=ev.data[1],d2=ev.data[2];
  if(cmd===0x90&&d2>0)noteOn(d1,d2,true);
  else if(cmd===0x80||(cmd===0x90&&d2===0))noteOff(d1);
  else if(cmd===0xB0&&d1===64){if(d2<64){Object.keys(held).forEach(function(m){if(held[m])noteOff(+m);});}}
}

// ═══ MODEL / OCTAVE ═══
function setModel(n){
  mdl=n;['25','49','61','88'].forEach(function(x){document.getElementById('b'+x).classList.toggle('on',+x===n);});
  var c=MC[n],s=c.s+octOff*12;buildKB(c.n,s);updOct(s);
}
function chOct(d){
  octOff=Math.max(-3,Math.min(3,octOff+d));
  var c=MC[mdl],s=c.s+octOff*12;buildKB(c.n,s);updOct(s);
}
function updOct(s){document.getElementById('octV').textContent=NN[((s%12)+12)%12]+(Math.floor(s/12)-1);}

// ═══ COMPUTER KEYBOARD ═══
var KB={'a':'C','w':'C#','s':'D','e':'D#','d':'E','f':'F','t':'F#','g':'G','y':'G#','h':'A','u':'A#','j':'B','k':'C2','o':'C#2','l':'D2','p':'D#2'};
var kbP={};
document.addEventListener('keydown',function(e){
  if(e.repeat||['INPUT','SELECT'].includes(e.target.tagName))return;
  var no=KB[e.key.toLowerCase()];if(!no||kbP[e.key])return;kbP[e.key]=true;
  var is2=no.endsWith('2'),nm=is2?no.slice(0,-1):no,ni=NN.indexOf(nm);if(ni<0)return;
  var s=MC[mdl].s+octOff*12,bo=Math.floor(s/12)-1,mn=(bo+(is2?2:1))*12+ni;
  if(mn>=0&&mn<=127)noteOn(mn,90,false);
});
document.addEventListener('keyup',function(e){
  var no=KB[e.key.toLowerCase()];if(!no)return;delete kbP[e.key];
  var is2=no.endsWith('2'),nm=is2?no.slice(0,-1):no,ni=NN.indexOf(nm);if(ni<0)return;
  var s=MC[mdl].s+octOff*12,bo=Math.floor(s/12)-1,mn=(bo+(is2?2:1))*12+ni;
  noteOff(mn);
});

// ═══ INIT ═══
buildKB(MC[49].n,MC[49].s);
initMidi();

if('serviceWorker'in navigator)navigator.serviceWorker.register('sw.js').catch(function(){});
</script>
